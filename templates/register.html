<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartHire Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        accent: '#8b5cf6',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 50px) scale(1.1); }
            66% { transform: translate(20px, -20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .animate-blob {
            animation: float 7s infinite;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .login-card-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Background Decorative Blobs -->
    <div class="absolute top-0 -left-4 w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob"></div>
    <div class="absolute top-0 -right-4 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-12 left-20 w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-4000"></div>

    <div class="max-w-6xl w-full glass-panel border border-slate-200 rounded-[48px] login-card-shadow flex flex-col md:row overflow-hidden relative z-10 flex flex-col md:flex-row">
        
        <!-- Left Panel: Brand & Visuals -->
        <div class="w-full md:w-5/12 bg-gradient-to-br from-primary to-accent p-12 flex flex-col justify-between text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-black/10 opacity-20"></div>
            
            <div class="relative z-10 my-auto">
                <div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-[32px] flex items-center justify-center mx-auto mb-8 shadow-xl border border-white/30 transform hover:-rotate-12 transition-transform duration-500">
                    <i data-lucide="user-plus" class="w-12 h-12 text-white"></i>
                </div>
                <h1 class="text-5xl font-black text-white mb-6 tracking-tight">Join SmartHire Bot</h1>
                <p class="text-white/90 text-lg font-medium leading-relaxed max-w-xs mx-auto">
                    Start your journey to interview mastery today.
                </p>
            </div>
            
            <div class="relative z-10 mt-8 pt-8 border-t border-white/10">
                <div class="flex justify-center gap-4 text-white/70 text-sm font-bold uppercase tracking-widest">
                    <span>Analyze</span>
                    <span class="w-1.5 h-1.5 bg-white/30 rounded-full my-auto"></span>
                    <span>Practice</span>
                    <span class="w-1.5 h-1.5 bg-white/30 rounded-full my-auto"></span>
                    <span>Succeed</span>
                </div>
            </div>
        </div>

        <!-- Right Panel: Register Form -->
        <div class="w-full md:w-7/12 p-12 md:p-16 flex flex-col justify-center bg-white/40 backdrop-blur-md overflow-y-auto max-h-[90vh] scrollbar-hide">
            <div class="mb-8">
                <h2 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">Create Account</h2>
                <p class="text-slate-500 font-medium text-lg">Join thousands of successful candidates.</p>
            </div>

            <form action="/register" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="group space-y-2 col-span-2 md:col-span-1">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1 group-focus-within:text-primary transition-colors">
                        Full Name
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <input type="text" name="full_name" placeholder="John Doe" required class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 text-slate-900 font-bold outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <div class="group space-y-2 col-span-2 md:col-span-1">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1 group-focus-within:text-primary transition-colors">
                        Email Address
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </div>
                        <input type="email" name="email" placeholder="name@company.com" required class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 text-slate-900 font-bold outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <div class="group space-y-2 col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1 group-focus-within:text-primary transition-colors">
                        Professional Field
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="briefcase" class="w-5 h-5"></i>
                        </div>
                        <select name="field" required class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 text-slate-900 font-bold outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Select Your Field</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Product Management">Product Management</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                            <i data-lucide="chevron-down" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

                <div class="group space-y-2 col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1 group-focus-within:text-primary transition-colors">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" name="password" placeholder="••••••••" required class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 text-slate-900 font-bold outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-xl shadow-slate-200 hover:bg-primary hover:shadow-primary/20 transition-all flex items-center justify-center gap-3 group mt-4 col-span-2">
                    CREATE MY ACCOUNT <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-slate-100">
                <p class="text-slate-500 font-medium">
                    Already have an account? 
                    <a href="/login" class="text-primary font-black hover:text-blue-700 ml-1 transition-colors">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
