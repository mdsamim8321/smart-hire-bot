<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartHire Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        accent: '#8b5cf6',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .animate-blob {
            animation: float 7s infinite;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .login-card-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Background Decorative Blobs -->
    <div class="absolute top-0 -left-4 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
    <div class="absolute top-0 -right-4 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-4000"></div>

    <div class="max-w-5xl w-full glass-panel border border-slate-200 rounded-[48px] login-card-shadow flex flex-col md:row overflow-hidden relative z-10 flex flex-col md:flex-row">
        
        <!-- Left Panel: Brand & Visuals -->
        <div class="w-full md:w-5/12 bg-primary p-12 flex flex-col justify-between text-center relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-black/10 rounded-full blur-3xl"></div>
            
            <div class="relative z-10 my-auto">
                <div class="w-20 h-20 bg-white/20 backdrop-blur-md rounded-[28px] flex items-center justify-center mx-auto mb-8 shadow-xl border border-white/30 transform hover:rotate-12 transition-transform duration-500">
                    <i data-lucide="cpu" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-4xl font-extrabold text-white mb-4 tracking-tight">SmartHire Bot</h1>
                <p class="text-blue-100 text-lg font-medium leading-relaxed max-w-xs mx-auto">
                    The next generation of AI-powered interview preparation.
                </p>
            </div>
            
            <div class="relative z-10 mt-8 pt-8 border-t border-white/10">
                <div class="flex justify-center gap-4 text-blue-100/60 text-sm font-bold uppercase tracking-widest">
                    <span>Analyze</span>
                    <span class="w-1.5 h-1.5 bg-white/30 rounded-full my-auto"></span>
                    <span>Practice</span>
                    <span class="w-1.5 h-1.5 bg-white/30 rounded-full my-auto"></span>
                    <span>Succeed</span>
                </div>
            </div>
        </div>

        <!-- Right Panel: Login Form -->
        <div class="w-full md:w-7/12 p-12 md:p-16 flex flex-col justify-center bg-white/40 backdrop-blur-md">
            <div class="mb-10">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-50 text-blue-600 text-xs font-bold mb-4 border border-blue-100">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    AI Ready
                </div>
                <h2 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">Welcome Back</h2>
                <p class="text-slate-500 font-medium">Continue your journey to your dream job.</p>
            </div>

            <form action="/login" method="POST" class="space-y-5">
                <div class="group space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest px-1 group-focus-within:text-primary transition-colors">
                        Email Address
                    </label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </div>
                        <input type="email" name="email" placeholder="name@company.com" required class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 text-slate-900 font-bold outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <div class="group space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest group-focus-within:text-primary transition-colors">
                            Password
                        </label>
                        <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" name="password" placeholder="••••••••" required class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 text-slate-900 font-bold outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-xl shadow-slate-200 hover:bg-primary hover:shadow-primary/20 transition-all flex items-center justify-center gap-3 group mt-4">
                    LOGIN TO DASHBOARD <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-10 text-center pt-8 border-t border-slate-100">
                <p class="text-slate-500 font-medium">
                    New here? 
                    <a href="/register" class="text-primary font-black hover:text-blue-700 ml-1 transition-colors">Create your account</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
